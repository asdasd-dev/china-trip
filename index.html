<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Китайские делишки</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/256/4545/4545114.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Рис">
    <meta name="theme-color" content="#C0392B">
    <script>
        // Apply theme before paint to avoid flash
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        html, body { height: 100%; overflow: hidden; touch-action: pan-x pan-y; }
        #scroller { height: 100%; overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
        :root {
            --nav-h: 62px;
            /* Light: warm cream */
            --bg: #FEFBF6;
            --content-bg: #fff;
            --text: #1a1a1a;
            --text-muted: #6a737d;
            --border: #F0DCC0;
            --h-border: #f0dcc0;
            --link: #C0392B;
            --toc-bg: #FFF7ED;
            --toc-title: #92400E;
            --toc-link: #C0392B;
            --toc-divider: #f5dfc0;
            --code-bg: #FFF7ED;
            --th-bg: #FFF7ED;
            --blockquote-border: #F0DCC0;
            --blockquote-text: #8c5a3a;
            --shadow: rgba(0,0,0,0.06);
            --nav-bg: #fff;
            --nav-border: #F0DCC0;
            --nav-accent: #C0392B;
            --scroll-bg: #C0392B;
            --city-btn-bg: #FFF7ED;
            --city-btn-border: #F0DCC0;
            --city-btn-text: #1a1a1a;
            --city-btn-active-bg: #C0392B;
            --toggle-bg: rgba(0,0,0,0.06);
            --toggle-border: rgba(0,0,0,0.08);
        }
        html[data-theme="dark"] {
            --bg: #0D1117;
            --content-bg: #0D1117;
            --text: #e6edf3;
            --text-muted: #7d8590;
            --border: #30363D;
            --h-border: #21262D;
            --link: #58a6ff;
            --toc-bg: #161B22;
            --toc-title: #7d8590;
            --toc-link: #58a6ff;
            --toc-divider: #21262D;
            --code-bg: #161B22;
            --th-bg: #161B22;
            --blockquote-border: #30363D;
            --blockquote-text: #7d8590;
            --shadow: rgba(0,0,0,0.4);
            --nav-bg: #010409;
            --nav-border: #21262D;
            --nav-accent: #F0C040;
            --scroll-bg: #30363D;
            --city-btn-bg: #161B22;
            --city-btn-border: #30363D;
            --city-btn-text: #e6edf3;
            --city-btn-active-bg: #F0C040;
            --toggle-bg: rgba(255,255,255,0.08);
            --toggle-border: rgba(255,255,255,0.12);
        }
        * { box-sizing: border-box; touch-action: pan-x pan-y; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            margin: 0 auto;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            transition: background 0.2s, color 0.2s;
        }
        #scroller {
            padding: 12px 12px calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 20px);
        }
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            margin: 0 auto;
            max-width: 900px;
            z-index: 100;
            background: var(--nav-bg);
            border-top: 1px solid var(--nav-border);
            padding: 6px 0 env(safe-area-inset-bottom, 8px);
            display: flex;
            transition: background 0.2s, border-color 0.2s;
            will-change: transform;
        }
        nav button {
            flex: 1;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 0 4px;
            -webkit-tap-highlight-color: transparent;
        }
        nav button .tab-icon {
            font-size: 22px;
            line-height: 1;
            opacity: 0.3;
            transition: opacity 0.15s;
        }
        nav button .tab-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: transparent;
            transition: background 0.2s;
        }
        nav button.active .tab-icon { opacity: 1; }
        nav button.active .tab-dot { background: var(--nav-accent); }
        #content {
            background: var(--content-bg);
            padding: 16px 14px;
            border-radius: 10px;
            box-shadow: 0 1px 3px var(--shadow);
            margin-top: 0;
            transition: background 0.2s;
        }
        h1, h2, h3, a[id] { scroll-margin-top: 16px; }
        h1 { border-bottom: 2px solid var(--h-border); padding-bottom: 10px; font-size: 1.5em; }
        h2 { margin-top: 28px; border-bottom: 1px solid var(--h-border); padding-bottom: 6px; font-size: 1.25em; }
        h3 { margin-top: 20px; font-size: 1.1em; }
        table { border-collapse: collapse; width: 100%; margin: 12px 0; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        th, td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; font-size: 13px; }
        td.num { white-space: nowrap; text-align: right; }
        th { background: var(--th-bg); }
        code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        pre { background: var(--code-bg); padding: 12px; border-radius: 8px; overflow-x: auto; }
        pre code { background: none; padding: 0; }
        blockquote { border-left: 4px solid var(--blockquote-border); margin: 12px 0; padding: 4px 12px; color: var(--blockquote-text); }
        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }
        img { max-width: 100%; height: auto; border-radius: 8px; margin: 12px 0; }
        ul, ol { padding-left: 20px; }
        li { margin: 4px 0; }
        .task-list-item {
            list-style: none;
            margin-left: -20px;
            padding-left: 4px;
        }
        .task-list-item input[type="checkbox"] {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--nav-accent);
        }
        .task-list-item.checked > span.task-text {
            text-decoration: line-through;
            opacity: 0.6;
        }
        #loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1em;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--link);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .city-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .city-nav button {
            padding: 6px 16px;
            border: 1px solid var(--city-btn-border);
            border-radius: 20px;
            background: var(--city-btn-bg);
            color: var(--city-btn-text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s, color 0.15s;
        }
        .city-nav button:active {
            background: var(--city-btn-active-bg);
            color: #fff;
            border-color: var(--city-btn-active-bg);
        }
        html[data-theme="dark"] .city-nav button:active { color: #000; }
        .toc-block {
            background: var(--toc-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
        }
        .toc-block .toc-title {
            font-weight: 600;
            font-size: 0.8em;
            color: var(--toc-title);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .toc-block a {
            display: block;
            padding: 3px 0;
            color: var(--toc-link);
            font-size: 0.85em;
            text-decoration: none;
            border-bottom: 1px solid var(--toc-divider);
        }
        .toc-block a:last-child { border-bottom: none; }
        .toc-block a:active { opacity: 0.7; }
        a.cross-link { color: var(--link); text-decoration: underline dotted; cursor: pointer; }
        /* Theme toggle button */
        #theme-toggle {
            position: fixed;
            top: 12px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--toggle-border);
            background: var(--toggle-bg);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s, border-color 0.2s, opacity 0.2s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 1;
        }
        #theme-toggle.hidden {
            opacity: 0;
            pointer-events: none;
        }
        @media (min-width: 640px) {
            body { max-width: 900px; font-size: 16px; }
            #scroller { padding: 20px 20px calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 24px); }
            #content { padding: 32px 40px; border-radius: 12px; }
            h1 { font-size: 2em; }
            h2 { font-size: 1.5em; }
            h3 { font-size: 1.17em; }
            th, td { padding: 8px 12px; white-space: normal; font-size: 14px; }
            table { display: table; }
            #theme-toggle { top: 16px; right: 24px; }
        }
    </style>
</head>
<body>
    <nav id="nav"></nav>
    <button id="theme-toggle" title="Переключить тему"></button>
    <div id="scroller">
        <div id="content">
            <div id="loading"><div class="spinner"></div><div>Loading...</div></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const BASE = './';
        const DB_URL = 'https://cn-trip-default-rtdb.asia-southeast1.firebasedatabase.app';
        const APP_VERSION = '20260422-1739';
        const pageCache = new Map();
        const tabScrollY = new Map();

        const PAGES = [
            { file: 'plan.md', label: 'Маршрут', icon: '🗺️' },
            { file: 'checklist.md', label: 'Чек-листы', icon: '✅' },
            { file: 'budget.md', label: 'Бюджет', icon: '💰' },
            { file: 'info.md', label: 'Инфо', icon: 'ℹ️' },
            { file: 'places.md', label: 'Места', icon: '📍' },
            { file: 'settings', label: 'О приложении', icon: '⚙️' },
        ];

        let currentPage = PAGES[0].file;
        const scroller = document.getElementById('scroller');

        // ── Theme toggle ──
        const themeToggle = document.getElementById('theme-toggle');
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        }
        applyTheme(localStorage.getItem('theme') || 'light');
        themeToggle.addEventListener('click', () => {
            applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });

        // ── Build nav ──
        const nav = document.getElementById('nav');
        PAGES.forEach(p => {
            const btn = document.createElement('button');
            btn.dataset.file = p.file;
            btn.title = p.label;
            btn.innerHTML = '<span class="tab-icon">' + p.icon + '</span><span class="tab-dot"></span>';
            if (p.file === currentPage) btn.classList.add('active');
            btn.addEventListener('click', () => {
                if (p.file === currentPage) {
                    scroller.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                loadPage(p.file);
            });
            nav.appendChild(btn);
        });

        // Checkbox state: loaded once, kept in memory
        let checkboxState = {};
        fetch(DB_URL + '/checkboxes.json')
            .then(r => r.json())
            .then(d => { if (d) checkboxState = d; })
            .catch(() => {});

        function saveCheckbox(key, checked) {
            checkboxState[key] = checked; // update local copy immediately
            fetch(DB_URL + '/checkboxes/' + key + '.json', {
                method: 'PUT',
                body: JSON.stringify(checked)
            });
        }

        async function loadPage(file, opts = {}) {
            if (!opts.skipSave && currentPage) {
                tabScrollY.set(currentPage, scroller.scrollTop);
            }
            currentPage = file;
            nav.querySelectorAll('button').forEach(b => {
                b.classList.toggle('active', b.dataset.file === file);
            });
            location.replace('#' + file.replace('.md', ''));

            const el = document.getElementById('content');

            if (file === 'settings') {
                const v = APP_VERSION;
                const y = v.slice(0,4), mo = v.slice(4,6), d = v.slice(6,8), h = v.slice(9,11), mi = v.slice(11,13);
                const changelog = [
                    { date: '22.04.2026', items: [
                        'PWA: офлайн-кэш, установка на домашний экран',
                        'Блокировка пинч-зума на iOS — в том числе во время инерционного скролла',
                        'Тёмная тема и адаптированная навигация',
                        'Кэш страниц — переключение вкладок без повторных запросов',
                        'Запоминание позиции скролла на каждой вкладке',
                        'Тёмный таб-бар с иконками и золотым индикатором',
                    ]},
                    { date: 'Ранее', items: [
                        'Кросс-ссылки между страницами маршрута и мест',
                        'Оглавление по городам с быстрой навигацией',
                        'Исправлен бюджет: дубли, ошибки в математике, расписание',
                        'Адаптивная верстка под мобильные',
                        'Firebase для синхронизации чекбоксов между устройствами',
                        'Разбивка на 5 вкладок: маршрут, чек-листы, бюджет, инфо, места',
                        'Базовый просмотрщик с интерактивными чекбоксами',
                    ]},
                ];
                const clHtml = changelog.map(g =>
                    '<h3 style="margin-top:20px;margin-bottom:8px;color:var(--text-muted);font-size:0.85em;text-transform:uppercase;letter-spacing:0.5px">' + g.date + '</h3>'
                    + '<ul style="margin:0;padding-left:20px">'
                    + g.items.map(i => '<li style="margin-bottom:6px">' + i + '</li>').join('')
                    + '</ul>'
                ).join('');
                el.innerHTML = '<h1>О приложении</h1>'
                    + '<div class="city-nav" id="settings-tabs">'
                    + '<button class="active" data-tab="info">Версия</button>'
                    + '<button data-tab="changelog">Ченжлог</button>'
                    + '</div>'
                    + '<div id="settings-info">'
                    + '<table style="margin-top:12px"><tr><th>Версия</th><td>' + v + '</td></tr>'
                    + '<tr><th>Обновлено</th><td>' + d + '.' + mo + '.' + y + ' ' + h + ':' + mi + '</td></tr></table>'
                    + '</div>'
                    + '<div id="settings-changelog" style="display:none">' + clHtml + '</div>';
                el.querySelector('#settings-tabs').addEventListener('click', e => {
                    const btn = e.target.closest('button');
                    if (!btn) return;
                    el.querySelectorAll('#settings-tabs button').forEach(b => b.classList.toggle('active', b === btn));
                    el.querySelector('#settings-info').style.display = btn.dataset.tab === 'info' ? '' : 'none';
                    el.querySelector('#settings-changelog').style.display = btn.dataset.tab === 'changelog' ? '' : 'none';
                });
                scroller.scrollTop = tabScrollY.get(file) || 0;
                return;
            }

            const cached = pageCache.has(file);
            if (!cached) {
                el.innerHTML = '<div id="loading"><div class="spinner"></div><div>Loading...</div></div>';
                scroller.scrollTop = 0;
            }

            try {
                const mdText = pageCache.has(file)
                    ? pageCache.get(file)
                    : await fetch(BASE + file).then(r => r.text()).then(t => { pageCache.set(file, t); return t; });
                const state = checkboxState;

                marked.setOptions({ breaks: true, gfm: true });
                let html = marked.parse(mdText);

                let idx = 0;
                html = html.replace(/<li><input\s[^>]*type="checkbox"[^>]*>\s*/gi, (match) => {
                    const key = file.replace('.md', '') + '_' + idx;
                    const i = idx++;
                    const checked = state[key] !== undefined ? state[key] : /checked/i.test(match);
                    return '<li class="task-list-item' + (checked ? ' checked' : '') + '"><input type="checkbox" data-key="' + key + '"' + (checked ? ' checked' : '') + '> <span class="task-text">';
                });

                el.innerHTML = html;

                const h1s = Array.from(el.querySelectorAll('h1'));
                const h2s = Array.from(el.querySelectorAll('h2'));

                function getAnchorId(heading) {
                    let prev = heading.previousElementSibling;
                    if (prev && prev.tagName === 'A' && prev.id) return prev.id;
                    if (prev) { prev = prev.previousElementSibling; if (prev && prev.tagName === 'A' && prev.id) return prev.id; }
                    return null;
                }

                if (h1s.length > 1) {
                    const cityNav = document.createElement('div');
                    cityNav.className = 'city-nav';
                    h1s.forEach(h1 => {
                        const btn = document.createElement('button');
                        btn.textContent = h1.textContent.split('(')[0].trim();
                        btn.addEventListener('click', () => h1.scrollIntoView({ behavior: 'instant' }));
                        cityNav.appendChild(btn);
                    });
                    el.insertBefore(cityNav, el.firstChild);

                    h1s.forEach((h1, cityIdx) => {
                        const nextH1 = h1s[cityIdx + 1];
                        const cityH2s = h2s.filter(h2 => {
                            const after = h1.compareDocumentPosition(h2) & Node.DOCUMENT_POSITION_FOLLOWING;
                            const before = !nextH1 || (nextH1.compareDocumentPosition(h2) & Node.DOCUMENT_POSITION_PRECEDING);
                            return after && before;
                        });
                        if (cityH2s.length === 0) return;
                        const toc = document.createElement('div');
                        toc.className = 'toc-block';
                        toc.innerHTML = '<div class="toc-title">Содержание</div>';
                        cityH2s.forEach(h2 => {
                            const anchorId = getAnchorId(h2);
                            const a = document.createElement('a');
                            a.textContent = h2.textContent;
                            a.href = anchorId ? '#' + anchorId : '#';
                            a.addEventListener('click', e => {
                                e.preventDefault();
                                h2.scrollIntoView({ behavior: 'instant' });
                            });
                            toc.appendChild(a);
                        });
                        let insertAfter = h1.nextElementSibling;
                        while (insertAfter && insertAfter.tagName !== 'H2' && insertAfter.tagName !== 'A' && insertAfter.tagName !== 'H1') {
                            insertAfter = insertAfter.nextElementSibling;
                        }
                        if (insertAfter) insertAfter.parentNode.insertBefore(toc, insertAfter);
                        else h1.after(toc);
                    });
                } else {
                    if (h2s.length > 2) {
                        const toc = document.createElement('div');
                        toc.className = 'toc-block';
                        toc.innerHTML = '<div class="toc-title">Содержание</div>';
                        h2s.forEach(h => {
                            const a = document.createElement('a');
                            a.textContent = h.textContent;
                            a.addEventListener('click', e => { e.preventDefault(); h.scrollIntoView({ behavior: 'instant' }); });
                            toc.appendChild(a);
                        });
                        el.insertBefore(toc, el.querySelector('h2') || el.firstChild);
                    }
                }

                el.querySelectorAll('a[href*=".md#"]').forEach(a => {
                    a.classList.add('cross-link');
                    a.addEventListener('click', e => {
                        e.preventDefault();
                        const href = a.getAttribute('href');
                        const [targetFile, targetId] = href.split('#');
                        loadPage(targetFile, { skipSave: true }).then(() => {
                            setTimeout(() => {
                                const target = document.getElementById(targetId);
                                if (target) target.scrollIntoView({ behavior: 'instant' });
                            }, 200);
                        });
                    });
                });

                el.querySelectorAll('td').forEach(td => {
                    if (/^[\s\*]*[\d¥₽\s,.—–]+[\s\*]*$/.test(td.textContent.trim())) {
                        td.classList.add('num');
                    }
                });

                el.querySelectorAll('.task-list-item').forEach(li => {
                    const span = li.querySelector('span.task-text');
                    if (span) {
                        while (span.nextSibling) span.appendChild(span.nextSibling);
                    }
                });

                el.addEventListener('change', e => {
                    if (e.target.matches('.task-list-item input[type="checkbox"]')) {
                        const checked = e.target.checked;
                        const key = e.target.dataset.key;
                        saveCheckbox(key, checked);
                        e.target.closest('.task-list-item').classList.toggle('checked', checked);
                    }
                });

                // Restore tab scroll (skip for cross-link — it scrolls to target anchor itself)
                if (!opts.skipSave) {
                    scroller.scrollTop = tabScrollY.get(file) || 0;
                }
            } catch (err) {
                el.innerHTML = '<p style="color:red">Failed to load: ' + err.message + '</p>';
            }
        }

        // ── visualViewport: keep nav above browser chrome on mobile ──
        if (window.visualViewport) {
            const updateNav = () => {
                const vv = window.visualViewport;
                const offset = window.innerHeight - vv.height - vv.offsetTop;
                nav.style.transform = offset > 0 ? 'translateY(' + (-Math.round(offset)) + 'px)' : '';
            };
            window.visualViewport.addEventListener('resize', updateNav);
            window.visualViewport.addEventListener('scroll', updateNav);
        }

        // ── Scroll: hide theme toggle + throttled tab scroll save ──
        let scrollSaveTimer = null;
        scroller.addEventListener('scroll', () => {
            themeToggle.classList.toggle('hidden', scroller.scrollTop > 30);
            if (scrollSaveTimer) return;
            scrollSaveTimer = setTimeout(() => {
                tabScrollY.set(currentPage, scroller.scrollTop);
                scrollSaveTimer = null;
            }, 150);
        }, { passive: true });

        // ── Disable pinch/double-tap zoom ──
        // CSS touch-action handles static touch; JS covers inertial scroll phase
        // where touch-action is no longer evaluated by Safari
        // Block pinch zoom on the scroll container (fires during inertial scroll unlike window-level)
        let lastTouchEnd = 0;
        scroller.addEventListener('touchstart', e => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        scroller.addEventListener('touchmove', e => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        scroller.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouchEnd < 300) e.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });
        // Safari proprietary gesture system (keep on document — not scroll-related)
        document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
        document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        const hash = location.hash.slice(1);
        const initial = PAGES.find(p => p.file.replace('.md', '') === hash);
        loadPage(initial ? initial.file : PAGES[0].file);
    </script>
</body>
</html>
