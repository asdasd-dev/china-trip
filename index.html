<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Китайские делишки</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/256/4545/4545114.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Рис">
    <meta name="theme-color" content="#FEFBF6">
    <script>
        // Apply theme + accent before paint to avoid flash
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            var tc = document.querySelector('meta[name="theme-color"]');
            if (tc) tc.setAttribute('content', t === 'dark' ? '#0D1117' : '#FEFBF6');
            var accents = {
                red:    { light: '#C0392B', dark: '#FF6B6B' },
                orange: { light: '#D35400', dark: '#FF9F43' },
                gold:   { light: '#B7860B', dark: '#F0C040' },
                green:  { light: '#27AE60', dark: '#55EFC4' },
                blue:   { light: '#1A6FA8', dark: '#74B9FF' },
                purple: { light: '#7D3C98', dark: '#A29BFE' },
            };
            var a = localStorage.getItem('accent') || 'red';
            var entry = accents[a] || accents.red;
            var color = t === 'dark' ? entry.dark : entry.light;
            // Full light palette for secondary colors (only needed in light mode before JS runs)
            var lightPalettes = {
                red:    { tocBg: '#FFF7ED', tocTitle: '#92400E', border: '#F0DCC0', tocDivider: '#f5dfc0', bqText: '#8c5a3a' },
                orange: { tocBg: '#FFF3E0', tocTitle: '#7c3a00', border: '#F5CBA7', tocDivider: '#f5c490', bqText: '#7c4a20' },
                gold:   { tocBg: '#FFFDE7', tocTitle: '#5c4400', border: '#F0D878', tocDivider: '#e8cc50', bqText: '#7a5e10' },
                green:  { tocBg: '#F0FFF4', tocTitle: '#1a5c30', border: '#A9DFBF', tocDivider: '#90d4a8', bqText: '#2e7d46' },
                blue:   { tocBg: '#EBF5FB', tocTitle: '#154360', border: '#AED6F1', tocDivider: '#90c8ec', bqText: '#1a5276' },
                purple: { tocBg: '#F5EEF8', tocTitle: '#4a235a', border: '#D7BDE2', tocDivider: '#c8a8d8', bqText: '#6c3483' },
            };
            if (t !== 'dark') {
                var lp = lightPalettes[a] || lightPalettes.red;
                r.style.setProperty('--toc-bg', lp.tocBg);
                r.style.setProperty('--toc-title', lp.tocTitle);
                r.style.setProperty('--toc-divider', lp.tocDivider);
                r.style.setProperty('--th-bg', lp.tocBg);
                r.style.setProperty('--code-bg', lp.tocBg);
                r.style.setProperty('--border', lp.border);
                r.style.setProperty('--h-border', lp.border);
                r.style.setProperty('--blockquote-border', lp.border);
                r.style.setProperty('--blockquote-text', lp.bqText);
            }
            var r = document.documentElement;
            r.style.setProperty('--link', color);
            r.style.setProperty('--toc-link', color);
            r.style.setProperty('--nav-accent', color);
            r.style.setProperty('--scroll-bg', color);
            r.style.setProperty('--city-btn-active-bg', color);
        })();
    </script>
    <style>
        html, body { height: 100%; overflow: hidden; touch-action: pan-x pan-y; }
        #scroller { height: 100%; overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
        :root {
            --nav-h: 82px;
            /* Light: warm cream */
            --bg: #FEFBF6;
            --content-bg: #fff;
            --text: #1a1a1a;
            --text-muted: #6a737d;
            --border: #F0DCC0;
            --h-border: #f0dcc0;
            --link: #C0392B;
            --toc-bg: #FFF7ED;
            --toc-title: #92400E;
            --toc-link: #C0392B;
            --toc-divider: #f5dfc0;
            --code-bg: #FFF7ED;
            --th-bg: #FFF7ED;
            --blockquote-border: #F0DCC0;
            --blockquote-text: #8c5a3a;
            --shadow: rgba(0,0,0,0.06);
            --nav-bg: #fff;
            --nav-border: #F0DCC0;
            --nav-accent: #C0392B;
            --scroll-bg: #C0392B;
            --city-btn-bg: #FFF7ED;
            --city-btn-border: #F0DCC0;
            --city-btn-text: #1a1a1a;
            --city-btn-active-bg: #C0392B;
            --toggle-bg: rgba(0,0,0,0.06);
            --toggle-border: rgba(0,0,0,0.08);
            --img-bg: #EDE5D8;
        }
        html[data-theme="dark"] {
            --bg: #0D1117;
            --content-bg: #0D1117;
            --text: #e6edf3;
            --text-muted: #7d8590;
            --border: #30363D;
            --h-border: #21262D;
            --link: #58a6ff;
            --toc-bg: #161B22;
            --toc-title: #7d8590;
            --toc-link: #58a6ff;
            --toc-divider: #21262D;
            --code-bg: #161B22;
            --th-bg: #161B22;
            --blockquote-border: #30363D;
            --blockquote-text: #7d8590;
            --img-bg: #1C2128;
            --shadow: rgba(0,0,0,0.4);
            --nav-bg: #010409;
            --nav-border: #21262D;
            --nav-accent: #F0C040;
            --scroll-bg: #30363D;
            --city-btn-bg: #161B22;
            --city-btn-border: #30363D;
            --city-btn-text: #e6edf3;
            --city-btn-active-bg: #F0C040;
            --toggle-bg: rgba(255,255,255,0.08);
            --toggle-border: rgba(255,255,255,0.12);
        }
        * { box-sizing: border-box; touch-action: pan-x pan-y; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            margin: 0 auto;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            transition: background 0.2s, color 0.2s;
        }
        #scroller {
            padding: 12px 12px calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 32px);
        }
        nav {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
            left: 0; right: 0;
            margin: 0 auto;
            width: calc(100% - 32px);
            max-width: 480px;
            border-radius: 28px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.88);
            box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 1.5px 0 rgba(255,255,255,0.85) inset;
            padding: 12px 4px;
            display: flex;
            will-change: transform;
        }
        html[data-theme="dark"] nav {
            background: rgba(18, 18, 28, 0.68);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.07) inset;
        }
        nav button {
            flex: 1;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 4px;
            border-radius: 18px;
            margin: 0 2px;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s;
        }
        nav button.active {
            background: rgba(0,0,0,0.08);
        }
        html[data-theme="dark"] nav button.active {
            background: rgba(255,255,255,0.12);
        }
        nav button .tab-icon {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            color: var(--text);
            opacity: 0.28;
            transition: opacity 0.15s;
        }
        nav button.active .tab-icon {
            opacity: 1;
        }
        nav button .tab-icon svg {
            width: 24px;
            height: 24px;
        }
        nav button.has-update .tab-icon::after {
            content: '';
            position: absolute;
            top: -1px; right: -2px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            border: 1.5px solid transparent;
        }
        #content {
            background: var(--content-bg);
            padding: 16px 14px;
            border-radius: 10px;
            box-shadow: 0 1px 3px var(--shadow);
            margin-top: 0;
            transition: background 0.2s;
        }
        h1, h2, h3, a[id] { scroll-margin-top: 16px; }
        h1 { border-bottom: 2px solid var(--h-border); padding-bottom: 10px; font-size: 1.5em; }
        h2 { margin-top: 28px; border-bottom: 1px solid var(--h-border); padding-bottom: 6px; font-size: 1.25em; }
        h3 { margin-top: 20px; font-size: 1.1em; }
        table { border-collapse: collapse; width: 100%; min-width: 100%; margin: 12px 0; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        th, td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; font-size: 13px; }
        td.num { white-space: nowrap; text-align: right; }
        th { background: var(--th-bg); }
        code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        pre { background: var(--code-bg); padding: 12px; border-radius: 8px; overflow-x: auto; }
        pre code { background: none; padding: 0; }
        blockquote { border-left: 4px solid var(--blockquote-border); margin: 12px 0; padding: 4px 12px; color: var(--blockquote-text); }
        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }
        img { display: block; max-width: 100%; width: 100%; aspect-ratio: 4/3; object-fit: contain; border-radius: 12px; margin: 12px 0; background: var(--img-bg); border: 1px solid var(--border); }
        ul, ol { padding-left: 20px; }
        li { margin: 4px 0; }
        .task-list-item {
            list-style: none;
            margin-left: -20px;
            padding-left: 4px;
        }
        .task-list-item input[type="checkbox"] {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--nav-accent);
        }
        .task-list-item.checked > span.task-text {
            text-decoration: line-through;
            opacity: 0.6;
        }
        #loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1em;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--link);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .city-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .city-nav.scrollable {
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 2px;
        }
        .city-nav.scrollable::-webkit-scrollbar { display: none; }
        .city-nav.scrollable button { flex-shrink: 0; }
        .city-nav button {
            padding: 6px 18px;
            border: 1px solid rgba(255,255,255,0.75);
            border-radius: 20px;
            background: rgba(255,255,255,0.62);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 0 rgba(255,255,255,0.7) inset;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.15s;
        }
        html[data-theme="dark"] .city-nav button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2), 0 1px 0 rgba(255,255,255,0.05) inset;
        }
        .city-nav button:active,
        .city-nav button.active {
            background: rgba(0,0,0,0.82);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        html[data-theme="dark"] .city-nav button:active,
        html[data-theme="dark"] .city-nav button.active {
            background: rgba(255,255,255,0.88);
            color: #000;
            border-color: transparent;
        }
        @keyframes today-dot-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.75); }
        }
        .city-nav button.today-btn {
            background: color-mix(in srgb, var(--link) 10%, transparent);
            color: var(--link);
            border-color: color-mix(in srgb, var(--link) 40%, transparent);
            font-weight: 600;
            gap: 5px;
            display: inline-flex;
            align-items: center;
        }
        .city-nav button.today-btn::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--link);
            flex-shrink: 0;
            animation: today-dot-pulse 2s ease-in-out infinite;
        }
        #today-toast {
            position: fixed;
            bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: var(--bg);
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 0.9em;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 200;
            cursor: pointer;
            max-width: calc(100vw - 40px);
            white-space: normal;
            text-align: center;
        }
        #today-toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .phrase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin: 12px 0 20px;
        }
        .phrase-card {
            background: var(--toc-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .phrase-ru {
            font-size: 0.78em;
            color: var(--text-muted);
            line-height: 1.3;
        }
        .phrase-zh {
            font-size: 1.6em;
            line-height: 1.2;
            color: var(--text);
            letter-spacing: 0.02em;
        }
        .phrase-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
            gap: 6px;
        }
        .phrase-pinyin {
            font-size: 0.8em;
            color: var(--link);
            font-style: italic;
            flex: 1;
            min-width: 0;
        }
        .phrase-when {
            font-size: 0.72em;
            color: var(--text-muted);
            margin-top: 2px;
            line-height: 1.3;
        }
        .phrase-play {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--link);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s;
        }
        .phrase-play:active { background: var(--toc-bg); }
        .phrase-play.speaking {
            background: color-mix(in srgb, var(--link) 15%, transparent);
            border-color: var(--link);
        }
        .toc-block {
            background: var(--toc-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
        }
        .toc-block .toc-title {
            font-weight: 600;
            font-size: 0.8em;
            color: var(--toc-title);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .toc-block a {
            display: block;
            padding: 3px 0;
            color: var(--toc-link);
            font-size: 0.85em;
            text-decoration: none;
            border-bottom: 1px solid var(--toc-divider);
        }
        .toc-block a:last-child { border-bottom: none; }
        .toc-block a:active { opacity: 0.7; }
        a.cross-link { color: var(--link); text-decoration: underline dotted; cursor: pointer; }
        hr { display: none; }
        #sticky-header {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 8px);
            left: 0; right: 0;
            margin: 0 auto;
            width: calc(100% - 32px);
            max-width: 480px;
            height: 40px;
            border-radius: 14px;
            z-index: 90;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.88);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 0 14px;
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            overflow: hidden;
        }
        #sticky-header.visible {
            opacity: 1;
            transform: translateY(0);
        }
        html[data-theme="dark"] #sticky-header {
            background: rgba(18,18,28,0.78);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 4px 16px rgba(0,0,0,0.45);
        }
        #sticky-header .sh-h1 { opacity: 0.5; }
        #sticky-header .sh-sep { opacity: 0.35; margin: 0 6px; }
        #sticky-header .sh-h2 { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #1a1a1a;
            color: #fff;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            z-index: 300;
            transition: transform 0.3s ease;
            pointer-events: none;
            cursor: default;
        }
        #toast.clickable {
            pointer-events: auto;
            cursor: pointer;
        }
        html[data-theme="dark"] #toast { background: #e6edf3; color: #0D1117; }
        #toast.visible { transform: translateX(-50%) translateY(0); }

        /* ── Search overlay ── */
        #search-overlay {
            position: fixed;
            inset: 0;
            z-index: 250;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        #search-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }
        #search-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: calc(env(safe-area-inset-top, 0px) + 14px) 16px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #search-input {
            flex: 1;
            border: none;
            background: var(--toc-bg);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 16px;
            color: var(--text);
            outline: none;
            font-family: inherit;
        }
        #search-input::placeholder { color: var(--text-muted); }
        #search-close {
            border: none;
            background: none;
            color: var(--text-muted);
            font-size: 15px;
            padding: 6px 4px 6px 8px;
            cursor: pointer;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        #search-results {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
        }
        #search-hint {
            padding: 48px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
        #search-hint .hint-icon { font-size: 36px; margin-bottom: 12px; }
        .search-page-group { margin-top: 8px; }
        .search-page-label {
            padding: 10px 16px 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--link);
        }
        .search-result {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s;
        }
        .search-result:active { background: var(--toc-bg); }
        .search-snippet {
            font-size: 14px;
            line-height: 1.55;
            color: var(--text);
        }
        .search-snippet mark {
            background: none;
            color: var(--link);
            font-weight: 700;
        }
        .search-breadcrumb {
            font-size: 0.75em;
            color: var(--text-muted);
            margin-bottom: 3px;
        }
        @keyframes search-flash {
            0%   { background: transparent; }
            15%  { background: color-mix(in srgb, var(--link) 20%, transparent); }
            70%  { background: color-mix(in srgb, var(--link) 20%, transparent); }
            100% { background: transparent; }
        }
        .search-flash {
            animation: search-flash 2s ease forwards;
            border-radius: 6px;
        }
        /* Pull indicator */
        #pull-indicator {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-muted);
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        #pull-indicator.visible { opacity: 1; }
        #pull-indicator svg { opacity: 0.5; }

        @media (min-width: 640px) {
            body { max-width: 900px; font-size: 16px; }
            #scroller { padding: 20px 20px calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 36px); }
            #content { padding: 32px 40px; border-radius: 12px; }
            h1 { font-size: 2em; }

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
        // ── In-app console ──
        const _consoleLogs = [];
        function _patchConsole(level, orig) {
            return function(...args) {
                orig.apply(console, args);
                const text = args.map(a => {
                    if (a instanceof Error) return a.stack || (a.message + ' (no stack)');
                    try { return typeof a === 'object' && a !== null ? JSON.stringify(a) : String(a); } catch { return String(a); }
                }).join(' ');
                _consoleLogs.push({ level, text, ts: new Date().toLocaleTimeString('ru') });
                if (_consoleLogs.length > 500) _consoleLogs.shift();
            };
        }
        console.log   = _patchConsole('log',   console.log.bind(console));
        console.warn  = _patchConsole('warn',  console.warn.bind(console));
        console.error = _patchConsole('error', console.error.bind(console));

        function renderConsoleLog() {
            const el = document.getElementById('console-log');
            if (!el) return;
            if (!_consoleLogs.length) { el.textContent = 'Логов нет'; return; }
            el.innerHTML = _consoleLogs.slice().reverse().map(e => {
                const color = e.level === 'error' ? '#e74c3c' : e.level === 'warn' ? '#e67e22' : 'var(--text-muted)';
                const escaped = e.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<div style="border-bottom:1px solid var(--border);padding:4px 0;color:${color}"><span style="opacity:.5">${e.ts}</span> ${escaped}</div>`;
            }).join('');
        }

        const BASE = './';
        const DB_URL = 'https://cn-trip-default-rtdb.asia-southeast1.firebasedatabase.app';
        const APP_VERSION = '2.1';
        const pageCache = new Map();
        const tabScrollY = new Map();

        const PAGES = [
            { file: 'plan.md',      label: 'Маршрут',       icon: 'map' },
            { file: 'checklist.md', label: 'Чек-листы',     icon: 'list-checks' },
            { file: 'budget.md',    label: 'Бюджет',        icon: 'wallet' },
            { file: 'info.md',      label: 'Инфо',          icon: 'info' },
            { file: 'places.md',    label: 'Места',         icon: 'map-pin' },
            { file: 'settings',     label: 'Настройки',     icon: 'settings' },
        ];

        const ACCENTS = [
            { id: 'red',    label: 'Красный',
              light: { color: '#C0392B', tocBg: '#FFF7ED', tocTitle: '#92400E', border: '#F0DCC0', tocDivider: '#f5dfc0', bqText: '#8c5a3a' },
              dark:  { color: '#FF6B6B' } },
            { id: 'orange', label: 'Оранжевый',
              light: { color: '#D35400', tocBg: '#FFF3E0', tocTitle: '#7c3a00', border: '#F5CBA7', tocDivider: '#f5c490', bqText: '#7c4a20' },
              dark:  { color: '#FF9F43' } },
            { id: 'gold',   label: 'Золотой',
              light: { color: '#B7860B', tocBg: '#FFFDE7', tocTitle: '#5c4400', border: '#F0D878', tocDivider: '#e8cc50', bqText: '#7a5e10' },
              dark:  { color: '#F0C040' } },
            { id: 'green',  label: 'Зелёный',
              light: { color: '#27AE60', tocBg: '#F0FFF4', tocTitle: '#1a5c30', border: '#A9DFBF', tocDivider: '#90d4a8', bqText: '#2e7d46' },
              dark:  { color: '#55EFC4' } },
            { id: 'blue',   label: 'Синий',
              light: { color: '#1A6FA8', tocBg: '#EBF5FB', tocTitle: '#154360', border: '#AED6F1', tocDivider: '#90c8ec', bqText: '#1a5276' },
              dark:  { color: '#74B9FF' } },
            { id: 'purple', label: 'Фиолетовый',
              light: { color: '#7D3C98', tocBg: '#F5EEF8', tocTitle: '#4a235a', border: '#D7BDE2', tocDivider: '#c8a8d8', bqText: '#6c3483' },
              dark:  { color: '#A29BFE' } },
        ];

        let currentPage = PAGES[0].file;
        const scroller = document.getElementById('scroller');
        let updateAvailable = false;
        let latestVersion = null;

        // ── Accent + Theme ──
        function _applyAccentColors(accent) {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const r = document.documentElement;
            if (isDark) {
                const { color } = accent.dark;
                r.style.setProperty('--link', color);
                r.style.setProperty('--toc-link', color);
                r.style.setProperty('--nav-accent', color);
                r.style.setProperty('--scroll-bg', color);
                r.style.setProperty('--city-btn-active-bg', color);
                // Dark mode secondary colors are always neutral — remove any light overrides
                r.style.removeProperty('--toc-bg');
                r.style.removeProperty('--toc-title');
                r.style.removeProperty('--toc-divider');
                r.style.removeProperty('--th-bg');
                r.style.removeProperty('--code-bg');
                r.style.removeProperty('--border');
                r.style.removeProperty('--h-border');
                r.style.removeProperty('--blockquote-border');
                r.style.removeProperty('--blockquote-text');
            } else {
                const { color, tocBg, tocTitle, border, tocDivider, bqText } = accent.light;
                r.style.setProperty('--link', color);
                r.style.setProperty('--toc-link', color);
                r.style.setProperty('--nav-accent', color);
                r.style.setProperty('--scroll-bg', color);
                r.style.setProperty('--city-btn-active-bg', color);
                r.style.setProperty('--toc-bg', tocBg);
                r.style.setProperty('--toc-title', tocTitle);
                r.style.setProperty('--toc-divider', tocDivider);
                r.style.setProperty('--th-bg', tocBg);
                r.style.setProperty('--code-bg', tocBg);
                r.style.setProperty('--border', border);
                r.style.setProperty('--h-border', border);
                r.style.setProperty('--blockquote-border', border);
                r.style.setProperty('--blockquote-text', bqText);
            }
        }

        function _updateSettingsInPlace() {
            if (currentPage !== 'settings') return;
            const el = document.getElementById('content');
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const currentAccent = localStorage.getItem('accent') || 'red';
            el.querySelectorAll('[data-theme-btn]').forEach(btn => {
                const isActive = btn.dataset.themeBtn === currentTheme;
                btn.style.background = isActive ? 'var(--link)' : 'var(--toc-bg)';
                btn.style.color = isActive ? '#fff' : 'var(--text)';
                btn.style.fontWeight = isActive ? '600' : '500';
            });
            el.querySelectorAll('[data-accent]').forEach(btn => {
                const a = ACCENTS.find(a => a.id === btn.dataset.accent);
                if (!a) return;
                const isActive = btn.dataset.accent === currentAccent;
                btn.style.background = currentTheme === 'dark' ? a.dark.color : a.light.color;
                btn.style.border = isActive ? '3px solid var(--text)' : '2px solid rgba(0,0,0,0.1)';
                btn.style.outline = isActive ? '2px solid var(--bg)' : 'none';
            });
        }

        function applyAccent(id) {
            const accent = ACCENTS.find(a => a.id === id) || ACCENTS[0];
            localStorage.setItem('accent', id);
            _applyAccentColors(accent);
            _updateSettingsInPlace();
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.querySelector('meta[name="theme-color"]').setAttribute('content', theme === 'dark' ? '#0D1117' : '#FEFBF6');
            const savedAccent = localStorage.getItem('accent') || 'red';
            const accent = ACCENTS.find(a => a.id === savedAccent) || ACCENTS[0];
            _applyAccentColors(accent);
            _updateSettingsInPlace();
        }
        applyTheme(localStorage.getItem('theme') || 'light');

        // ── Build nav ──
        const nav = document.getElementById('nav');
        PAGES.forEach(p => {
            const btn = document.createElement('button');
            btn.dataset.file = p.file;
            btn.title = p.label;
            btn.innerHTML = '<span class="tab-icon"><i data-lucide="' + p.icon + '"></i></span>';
            if (p.file === currentPage) btn.classList.add('active');
            btn.addEventListener('click', () => {
                if (p.file === currentPage) {
                    scroller.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                loadPage(p.file);
            });
            nav.appendChild(btn);
        });
        lucide.createIcons({ attrs: { 'stroke-width': '1.75' } });

        // Checkbox state: loaded once, kept in memory
        let checkboxState = {};
        fetch(DB_URL + '/checkboxes.json')
            .then(r => r.json())
            .then(d => { if (d) checkboxState = d; })
            .catch(() => {});

        function saveCheckbox(key, checked) {
            checkboxState[key] = checked;
            fetch(DB_URL + '/checkboxes/' + key + '.json', {
                method: 'PUT',
                body: JSON.stringify(checked)
            });
        }

        async function loadPage(file, opts = {}) {
            if (!opts.skipSave && currentPage) {
                tabScrollY.set(currentPage, scroller.scrollTop);
            }
            currentPage = file;
            nav.querySelectorAll('button').forEach(b => {
                b.classList.toggle('active', b.dataset.file === file);
            });
            location.replace('#' + file.replace('.md', ''));

            const el = document.getElementById('content');

            if (file === 'settings') {
                const v = APP_VERSION;
                const changelog = [
                    { date: '23.04.2026', items: [

                    ]},
                    { date: '23.04.2026', items: [

                    { date: 'Ранее', items: [
                        'Кросс-ссылки между страницами маршрута и мест',

                ];
                const clHtml = changelog.map(g =>
                    '<h3 style="margin-top:20px;margin-bottom:8px;color:var(--text-muted);font-size:0.85em;text-transform:uppercase;letter-spacing:0.5px">' + g.date + '</h3>'

                    + g.items.map(i => '<li style="margin-bottom:6px">' + i + '</li>').join('')
                    + '</ul>'
                ).join('');

                const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                const currentAccent = localStorage.getItem('accent') || 'red';

                const accentSwatches = ACCENTS.map(a => {
                    const color = currentTheme === 'dark' ? a.dark.color : a.light.color;

                const lightActive = currentTheme === 'light';

                el.innerHTML = '<h1>Настройки</h1>'
                    + '<div class="city-nav" id="settings-tabs">'

                el.querySelector('#settings-tabs').addEventListener('click', e => {

                el.querySelector('#smart-search-info-btn').addEventListener('click', function(e) {

                    showModal(

                        + '<p style="margin:0 0 12px">Например, по запросу <em>«животные»</em> найдёт текст про панд и тигров, хотя слова «животные» там нет.</p>'
                        + '<p style="margin:0 0 12px">Работает <strong>офлайн</strong> — ML-модель (~50 МБ) скачивается один раз и кэшируется. В Китае интернет не нужен.</p>'

                        const qWords = opts.searchQuery.trim().split(/\s+/).filter(Boolean);
                        const qWordRes = qWords.map(w => new RegExp(escapeRe(w), 'i'));

                        // N-gram matching: bigrams + trigrams из сниппета
                        // Сохраняет порядок слов → не ломается на падежах ("красивых" ≠ "красивые")
                        function ngramScore(b) {
                            if (!opts.searchSnippet) return 0;
                            const bText = b.textContent.toLowerCase();
                            const sWords = (opts.searchSnippet.toLowerCase().match(/[а-яёa-z0-9]+/gi) || []);
                            let hits = 0;
                            for (let i = 0; i < sWords.length - 1; i++) {
                                if (bText.includes(sWords[i] + ' ' + sWords[i + 1])) hits++;
                            }
                            for (let i = 0; i < sWords.length - 2; i++) {
                                if (bText.includes(sWords[i] + ' ' + sWords[i + 1] + ' ' + sWords[i + 2])) hits += 2;
                            }
                            return hits;
                        }

                        let target = null;

                        // Сначала ищем по n-граммам сниппета — самый точный способ
                        if (opts.searchSnippet) {
                            let bestScore = 0;
                            for (const b of blocks) {
                                const s = ngramScore(b);
                                if (s > bestScore) { bestScore = s; target = b; }
                            }
                        }

                        // Если n-граммы не дали результата — фолбэк на слова запроса
                        if (!target) {
                            const allMatch = blocks.filter(b => qWordRes.every(re => re.test(b.textContent)));
                            const anyMatch = blocks.filter(b => qWordRes.some(re => re.test(b.textContent)));

        // ── visualViewport: keep nav above browser chrome on mobile ──

        // ── Sticky header ──
        const stickyHeader = document.getElementById('sticky-header');

        function updateStickyHeader() {

        // ── Disable pinch/double-tap zoom ──

        let swReg = null;

        // ── Search ──
        const searchOverlay = document.getElementById('search-overlay');

        function openSearch() {

        document.getElementById('search-close').addEventListener('click', closeSearch);

        // Debounced search on input
        let searchTimer = null;
        searchInput.addEventListener('input', () => {
